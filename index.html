<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>第二十课 · Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --red:#C0392B;--red-dark:#8B1A1A;--gold:#C9A84C;--gold-light:#F0D060;
  --bg:#FAFAF8;--surface:#FFFFFF;--surface2:#F4F1EA;
  --text:#1A1209;--text2:#5A4A3A;--text3:#9A8A7A;
  --border:rgba(90,74,58,0.12);--border2:rgba(90,74,58,0.22);
  --green:#2D7A4F;--green-bg:#EAF5EE;
  --red-bg:#FEF0EE;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1A1209;--surface:#251A0F;--surface2:#2E2015;
    --text:#FAF6EE;--text2:#C8B89A;--text3:#7A6A55;
    --border:rgba(200,184,154,0.12);--border2:rgba(200,184,154,0.22);
    --green-bg:rgba(45,122,79,0.2);--red-bg:rgba(192,57,43,0.15);
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden}
button{cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── APP SHELL ── */
#app{min-height:100vh;display:flex;flex-direction:column;max-width:600px;margin:0 auto;padding:0}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--surface);
  border-bottom:0.5px solid var(--border);
  padding:10px 16px 8px;
  display:flex;align-items:center;gap:10px;
}
.topbar-title{font-size:13px;font-weight:500;color:var(--text2);flex:1}
.topbar-cn{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--red)}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;padding-bottom:80px}
.screen.active{display:flex}

/* ── SLIDE NAV ── */
.slide-nav-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:0.5px solid var(--border);
  background:var(--surface);
  position:sticky;top:53px;z-index:90;
}
.nav-btn{
  background:none;border:0.5px solid var(--border2);border-radius:8px;
  padding:6px 14px;font-size:12px;font-weight:500;color:var(--text2);
  display:flex;align-items:center;gap:5px;transition:all .15s;
}
.nav-btn:active{transform:scale(0.96);background:var(--surface2)}
.nav-btn:disabled{opacity:0.3;cursor:default}
.slide-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:200px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);border:none;padding:0;transition:all .2s}
.dot.active{background:var(--red);transform:scale(1.4)}
.slide-count{font-size:11px;color:var(--text3);white-space:nowrap}

/* ── SLIDE CONTENT ── */
.slides-container{flex:1;overflow-y:auto}
.slide-wrap{display:none;animation:fadeUp .25s ease;flex:1;flex-direction:column}
.slide-wrap.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TITLE SLIDE */
.title-slide{
  background:linear-gradient(160deg,var(--red-dark) 0%,var(--red) 55%,var(--red-dark) 100%);
  min-height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px 24px 40px;position:relative;overflow:hidden;flex:1;
}
.title-slide::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 20% 20%,rgba(201,168,76,.18) 0%,transparent 55%),
    radial-gradient(circle at 80% 80%,rgba(201,168,76,.12) 0%,transparent 45%);
}
.title-lanterns{font-size:28px;position:absolute;top:14px;width:100%;display:flex;justify-content:space-between;padding:0 20px;opacity:.85}
.t-lesson{font-size:11px;letter-spacing:3px;color:rgba(240,208,96,.75);margin-bottom:12px;position:relative;text-transform:uppercase}
.t-cn{font-family:'Noto Serif SC',serif;font-size:36px;color:var(--gold-light);margin-bottom:8px;position:relative;text-shadow:0 2px 12px rgba(0,0,0,.3);line-height:1.2}
.t-title{font-family:'DM Serif Display',serif;font-size:17px;color:rgba(255,255,255,.85);font-style:italic;position:relative}
.t-divider{width:50px;height:1px;background:rgba(201,168,76,.4);margin:18px auto;position:relative}
.t-sub{font-size:12px;color:rgba(255,255,255,.55);position:relative;letter-spacing:1px}
.t-emoji{font-size:24px;margin-top:20px;position:relative}

/* GENERAL SLIDE STYLES */
.content-pad{padding:20px 16px}
.slide-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:12px}
.slide-num{background:var(--red-bg);color:var(--red);font-weight:700;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.slide-topic{font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:1px;margin-bottom:2px}
.slide-main-title{font-size:18px;font-weight:600;color:var(--text)}
.slide-cn-badge{margin-left:auto;font-family:'Noto Serif SC',serif;font-size:22px;color:var(--gold);opacity:0.7}

/* VOCAB CARDS */
.vocab-grid{display:grid;grid-template-columns:1fr;gap:10px}
.vocab-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;transition:all 0.2s;position:relative}
.vc-cn{font-family:'Noto Serif SC',serif;font-size:24px;color:var(--text);margin-bottom:2px}
.vc-py{font-size:13px;color:var(--red);font-style:italic;margin-bottom:4px}
.vc-pos{font-size:10px;background:var(--surface2);padding:2px 6px;border-radius:4px;display:inline-block;color:var(--text2);margin-bottom:8px}
.vc-th{font-size:14px;color:var(--text2);font-weight:500}
.vc-example{display:none;margin-top:12px;padding-top:12px;border-top:0.5px dashed var(--border);animation:fadeUp 0.2s ease}
.vocab-card.open{border-color:var(--gold)}
.vocab-card.open .vc-example{display:block}
.ex-cn{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--text);margin-bottom:2px}
.ex-py{font-size:12px;color:var(--text3);margin-bottom:2px}
.ex-th{font-size:13px;color:var(--green)}
.slide-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;font-style:italic}

/* BOXES */
.gold-box{background:rgba(201,168,76,0.08);border-left:3px solid var(--gold);padding:10px 12px;border-radius:0 8px 8px 0;margin-top:12px}
.gold-label{font-size:10px;text-transform:uppercase;font-weight:600;color:var(--gold);margin-bottom:4px}
.warn-box{background:var(--red-bg);border-left:3px solid var(--red);padding:10px 12px;border-radius:0 8px 8px 0;margin-top:12px}
.warn-label{font-size:10px;text-transform:uppercase;font-weight:600;color:var(--red);margin-bottom:4px}

/* ZODIAC GRID */
.zodiac-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.zi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center;transition:all 0.2s}
.zi-em{font-size:20px;display:block;margin-bottom:4px}
.zi-cn{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:700}
.zi-py{font-size:11px;color:var(--text3)}
.zi.hi{border-color:var(--red);background:var(--red-bg)}

/* GRAMMAR BLOCK */
.grammar-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.g-label{font-size:11px;text-transform:uppercase;font-weight:600;color:var(--gold);margin-bottom:8px;letter-spacing:0.5px}
.g-ex{font-family:'Noto Serif SC',serif;font-size:16px;color:var(--text);margin-top:4px}
.g-py{font-size:12px;color:var(--red);font-style:italic}
.g-th{font-size:13px;color:var(--text2);margin-bottom:6px}

/* DATE ORDER */
.date-order{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0}
.du{text-align:center;background:var(--surface2);padding:8px 14px;border-radius:8px;min-width:60px}
.du-cn{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:700;color:var(--red)}
.du-lbl{font-size:10px;color:var(--text3);text-transform:uppercase}
.date-arrow{color:var(--text3);font-weight:700}

/* TWO COLUMNS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.compare-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.cc-title{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px}

/* CLOSING SLIDE */
.closing-slide{background:var(--surface2);padding:40px 20px;text-align:center;border-radius:16px;margin:16px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cl-cn{font-family:'Noto Serif SC',serif;font-size:28px;color:var(--red);margin-bottom:6px}
.cl-py{font-size:14px;color:var(--text3);font-style:italic;margin-bottom:4px}
.cl-th{font-size:16px;color:var(--text2);font-weight:500;margin-bottom:14px}
.cl-emoji{font-size:24px;margin-bottom:20px}
.cl-note{font-size:12px;color:var(--text3);line-height:1.5}

/* ── QUIZ STYLES ── */
.quiz-start{padding:40px 20px;text-align:center;display:flex;flex-direction:column;gap:16px;align-items:center;justify-content:center;flex:1}
.qs-cn{font-family:'Noto Serif SC',serif;font-size:36px;color:var(--red)}
.qs-title{font-size:22px;font-weight:600}
.qs-sub{font-size:13px;color:var(--text2);max-width:400px;margin-bottom:10px}
.qs-options{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
.qs-opt-btn{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--border);background:var(--surface);border-radius:12px;text-align:left;transition:all 0.15s}
.qs-opt-btn.selected{border-color:var(--red);background:var(--red-bg)}
.qs-opt-icon{font-size:20px}
.qs-start-btn{background:var(--red);color:white;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;margin-top:10px;width:100%;max-width:400px;transition:all 0.15s}
.qs-start-btn:active{transform:scale(0.98)}

.quiz-header{padding:16px;background:var(--surface);border-bottom:0.5px solid var(--border)}
.quiz-progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:10px}
.quiz-progress-fill{height:100%;background:var(--red);width:0%;transition:width 0.2s}
.quiz-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);font-weight:500}
.quiz-card{padding:16px;display:flex;flex-direction:column;gap:16px}
.quiz-q-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 16px;text-align:center}
.quiz-q-type{font-size:12px;text-transform:uppercase;color:var(--text3);letter-spacing:1px;margin-bottom:8px}
.quiz-q-cn{font-family:'Noto Serif SC',serif;font-size:44px;color:var(--text);font-weight:700;line-height:1.2}
.quiz-q-py{font-size:16px;color:var(--red);font-style:italic;margin-top:4px}
.q-opts{display:grid;grid-template-columns:1fr;gap:10px}
.q-opt{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;font-size:15px;font-weight:500;color:var(--text);transition:all 0.15s;display:flex;flex-direction:column;align-items:center;justify-content:center}
.q-opt:active{background:var(--surface2)}
.q-opt-cn{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;margin-bottom:2px}
.q-opt.correct{background:var(--green-bg) !important;border-color:var(--green) !important;color:var(--green) !important}
.q-opt.wrong{background:var(--red-bg) !important;border-color:var(--red) !important;color:var(--red) !important}
.q-opt.reveal-correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.quiz-feedback{padding:10px;border-radius:8px;font-size:13px;text-align:center;display:none;font-weight:500}
.quiz-feedback.show{display:block}
.quiz-feedback.ok{background:var(--green-bg);color:var(--green)}
.quiz-feedback.no{background:var(--red-bg);color:var(--red)}
.quiz-next-btn{background:var(--text);color:var(--surface);border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:600;display:none;width:100%}

.quiz-result{padding:40px 20px;text-align:center;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.quiz-result.show{display:flex}
.qr-emoji{font-size:48px}
.qr-title{font-size:24px;font-weight:700}
.qr-score{font-size:36px;font-weight:700;color:var(--red);margin:4px 0}
.qr-sub{font-size:14px;color:var(--text2);font-weight:500}
.qr-msg{font-size:13px;color:var(--text3);max-width:300px;margin-bottom:10px}
.qr-detail{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:left;display:flex;flex-direction:column;gap:10px;max-height:260px;overflow-y:auto}
.qr-row{display:flex;gap:10px;align-items:flex-start;padding-bottom:8px;border-bottom:0.5px solid var(--border)}
.qr-row:last-child{border-bottom:none;padding-bottom:0}
.qr-icon{font-size:14px;margin-top:2px}
.qr-q-text{font-size:13px;color:var(--text)}
.qr-restart{background:var(--red);color:white;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:600;margin-top:10px}

/* ── SUMMARY STYLES ── */
.sum-section{padding:16px 16px 4px}
.sum-section-title{font-size:14px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;position:relative}
.sum-cn{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:var(--text)}
.sum-py{font-size:11px;color:var(--red);font-style:italic}
.sum-pos-badge{position:absolute;top:10px;right:10px;font-size:9px;background:var(--surface2);padding:1px 4px;border-radius:3px;color:var(--text3)}
.sum-th{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}
.grammar-sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.gsm-title{font-size:14px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center}
.gsm-tag{font-size:10px;background:var(--red-bg);color:var(--red);padding:2px 6px;border-radius:4px}
.gsm-rule{font-size:12px;font-weight:500;color:var(--gold);margin:4px 0 8px;font-style:italic}
.gsm-ex{font-family:'Noto Serif SC',serif;font-size:14px;color:var(--text);margin-top:6px;font-weight:700}
.gsm-th{font-size:11px;color:var(--text2)}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--surface);
  border-top:0.5px solid var(--border);
  display:flex;max-width:600px;margin:0 auto;height:60px;
}
.bn-btn{
  flex:1;background:none;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:var(--text3);gap:4px;
}
.bn-icon{font-size:18px;opacity:0.6;transition:all 0.15s}
.bn-btn.active{color:var(--red)}
.bn-btn.active .bn-icon{opacity:1;transform:scale(1.1)}
</style>
</head>
<body>

<div id="app">

  <div class="topbar">
    <div>
      <div class="topbar-title">Lesson Presentation</div>
      <div class="topbar-cn">第二十课</div>
    </div>
  </div>
